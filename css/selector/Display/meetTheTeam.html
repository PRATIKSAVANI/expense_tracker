<!DOCTYPE html>

    <title>Document</title>

            background-color:darkgray;
            font-weight:bold;

        }
        h1{
            text-align: center;

        }

        .team{

            padding: 8px;
            box-shadow: 0 6px 12px blue;
            
        }

        .card img{
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 50%;
        }
        
    </style>
</head>
