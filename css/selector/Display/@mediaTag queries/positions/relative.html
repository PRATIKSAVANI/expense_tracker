<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <style>
        div{
            background-color: red;
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            position: relative;
            animation-name: sqaure;
            animation-duration: 3s;
            animation-iteration-count: infinite;
        }

        @keyframes sqaure {

            from    { background-color: red;  left: 100px}

            to      { background-color: black; left:200px ; top: 200px}

        }
    </style>
        

</head>
<body>
    <div></div>
    <strong> Come Back to original state after doint that Effect</strong>
</body>
</html>
