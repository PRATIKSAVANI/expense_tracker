<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       /*  Phone */
        @media screen and (min-width:0) and (max-width: 480px){

            body{
                background-color:rgb(64, 64, 132);
                color: white;
            }

            ul li{
                display: inline;
                margin-right: 10px;
                
            }
         

        }
    </style>
</head>
<body>

    <ul>
        <li>Home</li>
        <li>contact</li>
        <li>Support</li>
    </ul>

    <h1> Hello, Responsive World!</h1>
    <p> This is a responsive web page.</p>
    <p> it adapts to different screen size.</p>
</body>
</html>
