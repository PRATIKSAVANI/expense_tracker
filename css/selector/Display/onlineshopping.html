<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            background-color: aliceblue;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            margin: 10px;

        }

        .product{
            border: 1px solid black;
            border-radius: 12px;
            padding: 7px;
            box-shadow: 0 0 8px blue;
        }
        .product img{
            height: 300px;
            width: 100%;
            object-fit: cover;
            border-radius: 12px;
            overflow: hidden;
            display: block;
        }

        .parent{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            justify-content: space-around;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .product h2{
            margin-top: 20px;
        
        }

        .product p{
            margin-bottom: 10px;
        }

        .product button{
            background-color: lightslategray;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px; 
            cursor: pointer;
        }

        .product p{
            color:crimson;
            font-weight: bold;
            text-decoration:underline;

        }
    </style>
</head>
<body>
    <div class="parent">

        <div class="product">
            <img src="https://images.pexels.com/photos/30353222/pexels-photo-30353222.jpeg">
            <h2>IPHONE</h2>
            <p>price 50,000/-</p>
            <button>Add to cart</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/9853347/pexels-photo-9853347.jpeg">
            <h2>shoes nike</h2>
            <p>price 4,999/-</p>
            <button>Add to cart</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/102061/pexels-photo-102061.jpeg">
            <h2>laptop</h2>
            <p>price 70,000/-</p>
            <button>Add to cart</button>
        </div> 

        <div class="product">
            <img src="https://images.pexels.com/photos/11144317/pexels-photo-11144317.jpeg">
            <h2>watch apple</h2>
            <p>price 30,000/-</p>
            <button>Add to cart</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/1591/technology-music-sound-things.jpg">
            <h2>headphone</h2>
            <p>price 10,000/-</p>
            <button>Add to cart</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/8532616/pexels-photo-8532616.jpeg">
            <h2>t-shirt</h2>
            <p>price 500/-</p>
            <button>Add to cart</button>
        </div>




    </div>
</body>
</html>
