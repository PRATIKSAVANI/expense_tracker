<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .product{
            display: flex;
            /* Flex by default provide Display in row */
            /*Flex-dircetion: column; display the change */
            justify-content: center;
            gap: 20px;
            background-color: aqua;
            height: 300px;
            align-items: center;
            


        }


        .box{
            border: 1px solid black;
            width: 100px;
            height: 100px;
            border-radius: 8px;
            padding: 10px;
            font-weight: bold;
            font-family: italic;
            background-color: antiquewhite;
            box-shadow: 0 0 12px green;

        }
    </style>
</head>
<body>
    <!--flex Display in 1 dimensional - Row or Column-->

    <div class="product">

        <div class="box">cake .</div>
        <div class="box">cookies .</div>
        <div class="box">pastry .</div>

    </div>
</body>
</html>
