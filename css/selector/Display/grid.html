<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .product{
            display: grid;
            /* column */
            grid-template-columns: repeat(3, 1fr);
                                   /* repeat(no of column, size)  */
            gap: 20px; 
            flex-wrap:wrap;
            border-radius: 20px; 
            background-color:aquamarine;
            padding: 20px;
        




        }
        .box{
            background-color: aqua;
            border: 1px solid black;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style></head>
<body>
    <div class="product">
        <div class="box">cake . </div>
        <div class="box">price . </div>
        <div class="box">pastry . </div>
        <div class="box">price . </div>
        <div class="box">cookies . </div>
        <div class="box">price . </div>   
      
        
        
    </div>
</body>
</html>
